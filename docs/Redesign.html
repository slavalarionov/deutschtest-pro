<style>
  :root{
    --radius: 20px;
    --accent-h: 255;
    --accent: oklch(0.58 0.17 var(--accent-h));
    --accent-soft: oklch(0.94 0.04 var(--accent-h));
    --accent-ink: oklch(0.38 0.14 var(--accent-h));

    --bg: oklch(0.985 0.003 250);
    --surface: oklch(0.975 0.004 250);
    --card: #ffffff;
    --ink: oklch(0.17 0.012 260);
    --ink-soft: oklch(0.32 0.012 260);
    --muted: oklch(0.54 0.008 260);
    --line: oklch(0.92 0.004 260);
    --line-soft: oklch(0.955 0.003 260);
  }
  [data-theme="dark"]{
    --bg: oklch(0.13 0.01 260);
    --surface: oklch(0.16 0.012 260);
    --card: oklch(0.185 0.013 260);
    --ink: oklch(0.97 0.004 250);
    --ink-soft: oklch(0.85 0.006 250);
    --muted: oklch(0.65 0.01 260);
    --line: oklch(0.27 0.013 260);
    --line-soft: oklch(0.22 0.012 260);
    --accent-soft: oklch(0.28 0.09 var(--accent-h));
    --accent-ink: oklch(0.78 0.14 var(--accent-h));
  }
  html,body{ background: var(--bg); color: var(--ink); }
  body{
    font-family: 'Inter Tight', Inter, system-ui, sans-serif;
    font-feature-settings: "ss01","cv11","calt";
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }
  .font-display{ font-family:'Inter Tight', Inter, sans-serif; letter-spacing:-0.035em; font-weight:500; }
  .font-mono{ font-family:'JetBrains Mono', ui-monospace, monospace; }

  .rad{ border-radius: var(--radius); }
  .rad-sm{ border-radius: calc(var(--radius) * 0.55); }
  .rad-lg{ border-radius: calc(var(--radius) * 1.5); }
  .rad-pill{ border-radius: 999px; }

  .card{ background: var(--card); border: 1px solid var(--line); }
  .surface{ background: var(--surface); }
  .line{ border-color: var(--line); }
  .line-soft{ border-color: var(--line-soft); }
  .ink{ color: var(--ink); }
  .ink-soft{ color: var(--ink-soft); }
  .muted{ color: var(--muted); }
  .accent{ color: var(--accent); }
  .bg-accent{ background: var(--accent); }
  .bg-accent-soft{ background: var(--accent-soft); }
  .accent-ink{ color: var(--accent-ink); }
  .ring-accent{ box-shadow: 0 0 0 1px var(--accent); }
  .dotline{ background-image: radial-gradient(var(--line) 1px, transparent 1px); background-size: 12px 12px; }
  .gridline{
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Scrollbars */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:10px; }
  ::-webkit-scrollbar-track{ background: transparent; }

  /* Phone frame */
  .phone{
    width: 390px; height: 800px; border-radius: 46px;
    background: var(--bg);
    border: 1px solid var(--line);
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.25), 0 0 0 10px color-mix(in oklch, var(--ink) 92%, transparent), 0 0 0 11px var(--line);
    overflow: hidden; position: relative;
  }
  .phone .notch{ position:absolute; top:10px; left:50%; transform:translateX(-50%); width:110px; height:30px; background:#000; border-radius:999px; z-index:50;}

  /* Letter-as-graphic */
  .grafem{
    font-family:'Inter Tight', sans-serif;
    font-weight: 500;
    letter-spacing: -0.08em;
    line-height: 0.82;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--line);
  }
  .grafem-fill{ color: var(--ink); -webkit-text-stroke: 0; }
  .grafem-accent{ color: var(--accent); -webkit-text-stroke: 0; }

  /* Focus */
  .focus-ring:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Marquee for letters */
  @keyframes drift { from{ transform: translateX(0);} to{ transform: translateX(-50%);} }
  .drift{ animation: drift 60s linear infinite; }

  /* Tweaks panel */
  .tweaks{ position:fixed; right:16px; bottom:16px; z-index:200; }
  .tweaks-panel{ background: var(--card); border:1px solid var(--line); border-radius: 18px; box-shadow: 0 20px 60px -20px rgba(0,0,0,0.2); padding: 14px; width: 280px; }
  .swatch{ width:22px; height:22px; border-radius:999px; border:1px solid var(--line); cursor:pointer; }
  .swatch.on{ box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--ink); }

  /* Utility anims */
  .fade-in{ animation: fi .4s ease both; }
  @keyframes fi{ from{opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }

  /* custom selection */
  ::selection{ background: var(--accent-soft); color: var(--accent-ink); }

  /* Progress pipes */
  .pipe{ height: 3px; border-radius: 999px; background: var(--line); overflow:hidden; }
  .pipe > span{ display:block; height:100%; background: var(--ink); border-radius: 999px; }

  /* Chart grid */
  .axis{ stroke: var(--line); }
  .axis-soft{ stroke: var(--line-soft); }

  /* Buttons */
  .btn{ display:inline-flex; align-items:center; gap:.5rem; padding:.7rem 1.05rem; border-radius: calc(var(--radius) * 0.6); font-size: 14px; font-weight: 500; transition: all .15s ease; border: 1px solid transparent; cursor:pointer; white-space:nowrap;}
  .btn-primary{ background: var(--ink); color: var(--bg); }
  .btn-primary:hover{ transform: translateY(-1px); }
  .btn-accent{ background: var(--accent); color: #fff; }
  .btn-ghost{ background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover{ background: var(--surface); }

  .chip{ display:inline-flex; align-items:center; gap:.4rem; padding:.32rem .7rem; border-radius: 999px; font-size: 12px; font-weight:500; color: var(--ink-soft); background: var(--surface); border:1px solid var(--line); }
  .chip-dot::before{ content:""; width:6px; height:6px; border-radius: 999px; background: currentColor; display:inline-block; }

  /* Nav rail (left side of prototype) */
  .rail{ background: var(--surface); border-right:1px solid var(--line); }
  .rail-item{ padding: 8px 12px; border-radius: 10px; font-size: 13px; color: var(--ink-soft); cursor:pointer; display:flex; align-items:center; gap:10px; }
  .rail-item:hover{ background: var(--card); }
  .rail-item.on{ background: var(--ink); color: var(--bg); }

  /* Soft shadow */
  .shadow-lift{ box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 12px 32px -16px rgba(0,0,0,.12); }
</style>

/* ---------- Logo ---------- */
function Logo({ small }) {
  return (
    <div className="flex items-center gap-2">
      <div className="relative" style={{ width: small ? 22 : 28, height: small ? 22 : 28 }}>
        <div className="absolute inset-0 rad-sm" style={{ background: "var(--ink)" }} />
        <span className="absolute inset-0 flex items-center justify-center font-display" style={{ color: "var(--bg)", fontSize: small ? 14 : 18, fontWeight: 600 }}>ß</span>
      </div>
      <span className="font-display font-semibold" style={{ fontSize: small ? 14 : 16 }}>deutschtest<span style={{ color: "var(--muted)" }}>.pro</span></span>
    </div>
  );
}

/* ---------- Generic primitives ---------- */
function Chip({ children, tone = "default", icon }) {
  const style = tone === "accent"
    ? { background: "var(--accent-soft)", color: "var(--accent-ink)", borderColor: "transparent" }
    : {};
  return <span className="chip" style={style}>{icon && <Icon name={icon} size={12} />}{children}</span>;
}

function Button({ variant = "primary", children, icon, right, className = "", ...rest }) {
  const cls = {
    primary: "btn btn-primary",
    accent:  "btn btn-accent",
    ghost:   "btn btn-ghost",
  }[variant] || "btn btn-primary";
  return (
    <button className={`${cls} ${className}`} {...rest}>
      {icon && <Icon name={icon} size={14} />}
      <span>{children}</span>
      {right && <Icon name={right} size={14} />}
    </button>
  );
}

function Card({ children, className = "", style }) {
  return <div className={`card rad shadow-lift ${className}`} style={style}>{children}</div>;
}

/* ---------- Frame helpers ---------- */
function BrowserFrame({ url = "deutschtest.pro", children, height = 900 }) {

        {children}

  );
}

function PhoneFrame({ children, time = "9:41" }) {

    <div className="phone">

        </span>
      </div>
      <div className="h-full overflow-y-auto pt-12">{children}</div>
    </div>

}

/* Expose */
Object.assign(window, { Icon, Logo, Chip, Button, Card, BrowserFrame, PhoneFrame });

                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
      <button onClick={() => setOpen(o=>!o)} className="btn btn-primary mt-2" style={{ boxShadow: "0 12px 30px -10px rgba(0,0,0,.3)" }}>
        <Icon name="settings" size={14} /> Tweaks
      </button>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem("screen") || "landing");
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweakState, setTweakState] = useState(() => ({ ...window.__TWEAK_DEFAULTS }));
  const [tweaksAvailable, setTweaksAvailable] = useState(false);

  useEffect(() => { localStorage.setItem("screen", screen); }, [screen]);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent-h", String(tweakState.accentHue));
    root.style.setProperty("--accent", `oklch(0.58 0.17 ${tweakState.accentHue})`);
    root.style.setProperty("--accent-soft", `oklch(0.94 0.04 ${tweakState.accentHue})`);
    root.style.setProperty("--accent-ink", `oklch(0.38 0.14 ${tweakState.accentHue})`);
    root.style.setProperty("--radius", `${tweakState.radius}px`);
    root.setAttribute("data-theme", tweakState.theme);
  }, [tweakState]);

  // Host-driven tweak protocol
  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    setTweaksAvailable(true);
    return () => window.removeEventListener("message", onMsg);
  }, []);

  useEffect(() => {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: tweakState }, "*");
  }, [tweakState]);

  const all = [...DESKTOP_SCREENS, ...MOBILE_SCREENS];
  const current = all.find(s => s.id === screen) || DESKTOP_SCREENS[0];
  const isMobile = current.id.startsWith("m-");

  return (
    <div className="min-h-screen flex" style={{ background: "var(--surface)" }}>
      {/* Nav rail */}
      <div className="rail p-5 flex flex-col" style={{ width: 240, position: "sticky", top: 0, height: "100vh" }}>
        <Logo small />
        <div className="text-[10px] font-mono muted mt-6 mb-2">РЕДИЗАЙН · HI-FI</div>
        <div className="text-xs ink-soft leading-relaxed mb-6">Новый визуальный язык deutschtest.pro — прохладная палитра, минимализм, типографика с немецкими буквами.</div>

        <div className="text-[10px] font-mono muted mb-2">DESKTOP</div>
        <div className="space-y-0.5">
          {DESKTOP_SCREENS.map(s => (
            <div key={s.id} className={`rail-item ${s.id===screen?"on":""}`} onClick={() => setScreen(s.id)}>
              <span className="text-[10px] font-mono" style={{ opacity: .5 }}>{String(DESKTOP_SCREENS.indexOf(s)+1).padStart(2,"0")}</span>
              <span className="text-sm">{s.label}</span>
            </div>
          ))}
        </div>
        <div className="text-[10px] font-mono muted mt-6 mb-2">MOBILE</div>
        <div className="space-y-0.5">
          {MOBILE_SCREENS.map((s,i) => (
            <div key={s.id} className={`rail-item ${s.id===screen?"on":""}`} onClick={() => setScreen(s.id)}>
              <span className="text-[10px] font-mono" style={{ opacity: .5 }}>M{i+1}</span>
              <span className="text-sm">{s.label}</span>
            </div>
          ))}
        </div>

        <div className="flex-1" />
        <div className="text-[10px] font-mono muted">
          Inter Tight · JetBrains Mono<br/>
          oklch · radius {tweakState.radius}
        </div>
      </div>

      {/* Stage */}
      <div className="flex-1 overflow-auto">
        <div className={`${isMobile ? "flex items-start justify-center py-10" : ""}`} style={{ minHeight: "100vh" }}>
          {isMobile ? (
            <div>
              <div className="text-xs font-mono muted mb-4 text-center">{current.label}</div>
              {current.render()}
            </div>
          ) : (
            <div className="py-10">
              <BrowserFrame url={`deutschtest.pro / ${current.label}`} height={920}>
                {current.render()}
              </BrowserFrame>
            </div>
          )}
        </div>
      </div>

      <Tweaks open={tweaksOpen} setOpen={setTweaksOpen} state={tweakState} setState={setTweakState} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);


</script>
</body>
</html>
